version: 1
suite: signet-cli
description: >
  Self-acceptance contract for signet: validate a YAML contract, run its
  command steps with optional confirmation, and report concise pass/fail checks.

subject:
  binary: ./bin/signet

defaults:
  timeout: 10s
  confirm: true

cases:
  - id: help-surface
    name: help exposes the stable CLI surface
    steps:
      - name: root help
        run:
          args: ["--help"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "Usage:"
              - "signet validate <path>..."
              - "signet run <path>..."
              - "signet cases <path>... [--case <id>|--id <id>]"
              - "signet cases <path>... [--case <id>|--id <id>] --checks"
              - "signet completion zsh"
              - "--yes"
              - "--verbose"
              - "--keep-temp"
              - "--binary"
            notContains:
              - "signet discover"
              - "panic"
              - "unknown command"
          stderr:
            notContains:
              - "panic"

      - name: cases help
        run:
          args: ["cases", "--help"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "Usage:"
              - "signet cases <path>... [--case <id>|--id <id>]"
              - "signet cases <path>... [--case <id>|--id <id>] --checks"
            notContains:
              - "signet discover"
              - "invalid --help"
              - "stat --help"
              - "panic"

      - name: discover command is removed
        run:
          args: ["discover"]
        expect:
          exitCode: 2
          stdout:
            notContains:
              - "Usage:"
              - "signet discover"
              - "panic"
          stderr:
            contains:
              - "unknown command \"discover\""
            notContains:
              - "panic"

      - name: zsh completion
        run:
          args: ["completion", "zsh"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "#compdef signet"
              - "compdef _signet signet"
              - "_signet()"
            notContains:
              - "unknown command"
              - "panic"

      - name: run help
        run:
          args: ["run", "--help"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "Usage:"
              - "signet run <path>..."
              - "--yes"
              - "--verbose"
              - "--keep-temp"
              - "--binary"
            notContains:
              - "invalid --help"
              - "stat --help"
              - "panic"

  - id: cases-list
    name: cases lists test cases within a group
    steps:
      - name: list cases
        run:
          args: ["cases", "testdata/discover/cli.acceptance.yaml"]
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "CASES"
              - "id=validate-valid-file name=\"validate command accepts a valid file\""
              - "-----"
              - "id=run-pass-summary name=\"run command reports pass summary\""
            contains:
              - "testdata/discover/cli.acceptance.yaml"
              - "2 cases"
              - "2 steps"
            notContains:
              - "reporting fixture"
              - "panic"

      - name: list cases under a directory
        run:
          args: ["cases", "testdata/run"]
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "GROUP testdata/run/alpha.acceptance.yaml"
              - "id=alpha name=\"alpha fixture case\""
              - "GROUP testdata/run/nested/beta.acceptance.yaml"
              - "id=beta name=\"beta fixture case\""
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
            notContains:
              - "invalid"
              - "panic"

      - name: list one case by id
        run:
          args:
            - "cases"
            - "testdata/discover/cli.acceptance.yaml"
            - "--case"
            - "run-pass-summary"
            - "--checks"
        expect:
          exitCode: 0
          stdout:
            contains:
              - "CASE id=run-pass-summary name=\"run command reports pass summary\""
              - "STEP run fixture"
              - "stdout contains \"PASS\""
              - "1 case"
              - "1 step"
              - "5 checks"
            notContains:
              - "validate-valid-file"
              - "validate fixture"
              - "panic"

  - id: cases-checks
    name: cases can expand cases with their checks
    steps:
      - name: list cases with checks
        run:
          args: ["cases", "testdata/discover/cli.acceptance.yaml", "--checks"]
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "id=validate-valid-file name=\"validate command accepts a valid file\""
              - "validate fixture"
              - "COMMAND ./bin/signet validate testdata/pass.acceptance.yaml"
              - "exitCode == 0"
              - "stdout contains \"valid\""
              - "stdout notContains \"invalid\""
              - "-----"
              - "id=run-pass-summary name=\"run command reports pass summary\""
              - "run fixture"
              - "COMMAND ./bin/signet run testdata/pass.acceptance.yaml --yes"
              - "stdout contains \"PASS\""
              - "stdout orderedContains \"RUN sample command\""
              - "stdout orderedContains \"PASS sample command\""
              - "stdout notContains \"FAIL\""
            contains:
              - "CHECK"
              - "2 cases"
              - "2 steps"
              - "8 checks"
            notContains:
              - "panic"

      - name: list cases with checks from expanded paths
        run:
          args:
            - "cases"
            - "testdata/run/alpha.acceptance.yaml"
            - "testdata/run/nested"
            - "--checks"
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "GROUP testdata/run/alpha.acceptance.yaml"
              - "alpha fixture"
              - "COMMAND /bin/echo alpha"
              - "stdout contains \"alpha\""
              - "GROUP testdata/run/nested/beta.acceptance.yaml"
              - "beta fixture"
              - "COMMAND /bin/echo beta"
              - "stdout contains \"beta\""
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
              - "4 checks"
            notContains:
              - "invalid"
              - "panic"

  - id: validate-valid
    name: validate accepts a well-formed contract
    steps:
      - name: validate passing fixture
        run:
          args: ["validate", "testdata/pass.acceptance.yaml"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "valid"
              - "testdata/pass.acceptance.yaml"
              - "1 case"
              - "1 step"
            notContains:
              - "invalid"
              - "failed"
          stderr:
            notContains:
              - "panic"

      - name: validate directory fixture
        run:
          args: ["validate", "testdata/run"]
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "valid testdata/run/alpha.acceptance.yaml"
              - "valid testdata/run/nested/beta.acceptance.yaml"
              - "valid testdata/run"
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
            notContains:
              - "invalid"
              - "panic"

      - name: validate expanded file and directory paths
        run:
          args:
            - "validate"
            - "testdata/run/alpha.acceptance.yaml"
            - "testdata/run/nested"
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "valid testdata/run/alpha.acceptance.yaml"
              - "valid testdata/run/nested/beta.acceptance.yaml"
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
            notContains:
              - "invalid"
              - "panic"

  - id: validate-invalid
    name: validate rejects malformed contracts with field paths
    steps:
      - name: validate invalid fixture
        run:
          args: ["validate", "testdata/invalid.acceptance.yaml"]
        expect:
          exitCode: 1
          stdout:
            contains:
              - "invalid"
              - "testdata/invalid.acceptance.yaml"
              - "cases[0].steps[0].expect.exitCode"
            notContains:
              - "panic"

      - name: validate missing case id
        run:
          args: ["validate", "testdata/missing-id.acceptance.yaml"]
        expect:
          exitCode: 1
          stdout:
            contains:
              - "invalid"
              - "testdata/missing-id.acceptance.yaml"
              - "cases[0].id"
              - "is required"
            notContains:
              - "panic"

  - id: run-pass
    name: run executes a passing contract without prompts when --yes is set
    steps:
      - name: run passing fixture
        run:
          args: ["run", "testdata/pass.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "PASS"
              - "testdata/pass.acceptance.yaml"
              - "passing echo command"
              - "1 case"
              - "1 step"
              - "0 failed"
            notContains:
              - "Confirm"
              - "FAIL"
              - "panic"

      - name: run passing fixture with verbose output
        run:
          args: ["run", "testdata/pass.acceptance.yaml", "--yes", "--verbose"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "COMMAND /bin/echo hello signet"
              - "EXIT 0"
              - "STDOUT"
              - "hello signet"
              - "STDERR"
              - "(empty)"
              - "PASS passing echo command"
            contains:
              - "PASS"
              - "0 failed"
            notContains:
              - "Confirm"
              - "FAIL"
              - "panic"

      - name: run two cases with visible separator
        run:
          args: ["run", "testdata/two-cases.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "CASE id=first-case name=\"first case\""
              - "PASS first command"
              - "-----"
              - "CASE id=second-case name=\"second case\""
              - "PASS second command"
            contains:
              - "2 cases"
              - "2 steps"
              - "0 failed"
            notContains:
              - "Confirm"
              - "FAIL"
              - "panic"

  - id: run-directory
    name: run executes acceptance contracts under a directory
    steps:
      - name: run directory fixture
        run:
          args: ["run", "testdata/run", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "GROUP testdata/run/alpha.acceptance.yaml"
              - "PASS testdata/run/alpha.acceptance.yaml"
              - "GROUP testdata/run/nested/beta.acceptance.yaml"
              - "PASS testdata/run/nested/beta.acceptance.yaml"
              - "PASS testdata/run"
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
              - "0 failed"
            notContains:
              - "Confirm"
              - "FAIL"
              - "panic"

      - name: run expanded file and directory paths
        run:
          args:
            - "run"
            - "testdata/run/alpha.acceptance.yaml"
            - "testdata/run/nested"
            - "--yes"
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "GROUP testdata/run/alpha.acceptance.yaml"
              - "PASS testdata/run/alpha.acceptance.yaml"
              - "GROUP testdata/run/nested/beta.acceptance.yaml"
              - "PASS testdata/run/nested/beta.acceptance.yaml"
            contains:
              - "2 groups"
              - "2 cases"
              - "2 steps"
              - "0 failed"
            notContains:
              - "Confirm"
              - "FAIL"
              - "panic"

  - id: run-setup
    name: run creates temporary setup files for a contract
    steps:
      - name: run setup fixture
        run:
          args: ["run", "testdata/setup.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "CASE id=setup-file-variable name=\"setup file variables feed live commands\""
              - "PASS read generated config"
              - "PASS expand setup dir in shell"
              - "2 steps"
              - "0 failed"
            notContains:
              - ".myapp"
              - "FAIL"
              - "panic"

  - id: run-setup-env-files
    name: run loads setup dotenv files for direct commands
    steps:
      - name: inspect setup env file fixture
        run:
          args: ["cases", "testdata/setup-env.acceptance.yaml", "--checks"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "CASE id=setup-env-file name=\"setup envFiles feed direct commands\""
              - "COMMAND /usr/bin/printenv SIGNET_ACCEPTANCE_SETUP_ENV_VALUE"
              - "COMMAND /usr/bin/printenv SIGNET_ACCEPTANCE_SETUP_ENV_REQUIRED"
            notContains:
              - "/bin/sh -c"
              - "panic"

      - name: run setup env file fixture
        run:
          args: ["run", "testdata/setup-env.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "CASE id=setup-env-file name=\"setup envFiles feed direct commands\""
              - "PASS print loaded env var"
              - "PASS require loaded env var"
              - "2 steps"
              - "0 failed"
            notContains:
              - "/bin/sh -c"
              - "FAIL"
              - "panic"

  - id: run-fail
    name: run reports concise check failures
    steps:
      - name: run failing fixture
        run:
          args: ["run", "testdata/fail.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 1
          stdout:
            contains:
              - "FAIL"
              - "testdata/fail.acceptance.yaml"
              - "failing echo command"
              - "stdout contains"
              - "missing-token"
              - "1 failed"
            notContains:
              - "panic"

  - id: run-order
    name: run keeps command order visible in the report
    steps:
      - name: run sequence fixture
        run:
          args: ["run", "testdata/sequence.acceptance.yaml", "--yes"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "RUN first command"
              - "PASS first command"
              - "RUN second command"
              - "PASS second command"
            contains:
              - "2 steps"
              - "0 failed"
            notContains:
              - "FAIL"

  - id: run-confirm
    name: run asks for confirmation by default
    steps:
      - name: decline first prompt
        run:
          args: ["run", "testdata/pass.acceptance.yaml"]
          stdin: "n\n"
          timeout: 5s
        expect:
          exitCode: 130
          stdout:
            contains:
              - "Confirm"
              - "passing echo command"
              - "aborted"
              - "--yes"
            notContains:
              - "PASS passing echo command"
              - "panic"

  - id: run-write-kind
    name: write steps require confirmation even when read prompts are skipped
    steps:
      - name: inspect write kind
        run:
          args: ["cases", "testdata/write.acceptance.yaml", "--checks"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "STEP create sample"
              - "KIND write"
              - "COMMAND /bin/echo created"

      - name: decline write prompt despite yes flag
        run:
          args: ["run", "testdata/write.acceptance.yaml", "--yes"]
          stdin: "n\n"
          timeout: 5s
        expect:
          exitCode: 130
          stdout:
            contains:
              - "Confirm WRITE"
              - "create sample"
              - "aborted"
            notContains:
              - "PASS create sample"
              - "use --yes to skip"

      - name: accept write prompt despite yes flag
        run:
          args: ["run", "testdata/write.acceptance.yaml", "--yes"]
          stdin: "y\n"
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "Confirm WRITE"
              - "PASS create sample"
              - "0 failed"

  - id: run-binary-override
    name: binary override targets a different final binary
    steps:
      - name: override subject binary
        run:
          args:
            - "run"
            - "testdata/pass.acceptance.yaml"
            - "--binary"
            - "/bin/echo"
            - "--yes"
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "PASS"
              - "using binary /bin/echo"
              - "0 failed"
            notContains:
              - "panic"

  - id: run-build
    name: setup.build runs before cases and ${binary} expands
    steps:
      - name: run build fixture
        run:
          args: ["run", "testdata/build.acceptance.yaml", "--yes"]
          timeout: 30s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "BUILD echo built-token"
              - "PASS read build marker"
              - "PASS binary variable expands"
            contains:
              - "1 case"
              - "2 steps"
              - "0 failed"
            notContains:
              - "FAIL"
              - "panic"

  - id: run-services
    name: setup.services start before cases and stop after
    steps:
      - name: run services fixture
        run:
          args: ["run", "testdata/services.acceptance.yaml", "--yes"]
          timeout: 30s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "SERVICE fileserver"
              - "PASS build marker present"
              - "PASS service wrote its marker"
              - "PASS testdata/services.acceptance.yaml"
              - "STOP fileserver"
            contains:
              - "0 failed"
            notContains:
              - "FAIL"
              - "panic"

  - id: cases-setup-build-services
    name: cases --checks makes build and services visible
    steps:
      - name: inspect build and services
        run:
          args: ["cases", "testdata/services.acceptance.yaml", "--checks"]
          timeout: 5s
        expect:
          exitCode: 0
          stdout:
            orderedContains:
              - "BUILD echo ready-to-serve"
              - "SERVICE fileserver"
              - "COMMAND echo listening"
              - "READY log \"listening\""
              - "CASES"
              - "CASE id=service-up"
            notContains:
              - "panic"

  - id: run-build-gate
    name: a failing build blocks the cases
    steps:
      - name: run failing build fixture
        run:
          args: ["run", "testdata/no-build.acceptance.yaml", "--yes"]
          timeout: 10s
        expect:
          exitCode: 1
          stdout:
            orderedContains:
              - "BUILD exit 7"
              - "FAIL build: exit 7"
            notContains:
              - "standalone-ok"
              - "CASE id=independent"
              - "PASS"
              - "panic"

  - id: run-no-build
    name: --no-build skips setup.build and runs the existing binary
    steps:
      - name: run with no-build
        run:
          args: ["run", "testdata/no-build.acceptance.yaml", "--yes", "--no-build"]
          timeout: 10s
        expect:
          exitCode: 0
          stdout:
            contains:
              - "PASS standalone check"
              - "0 failed"
            notContains:
              - "BUILD"
              - "FAIL"
              - "panic"
