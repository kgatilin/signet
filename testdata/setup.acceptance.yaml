version: 1
suite: setup-fixture
description: Fixture proving setup files are isolated from global user config.

subject:
  binary: /bin/cat

setup:
  requireEnv: ["PATH"]
  files:
    - name: appConfig
      path: config/app.yaml
      content: |
        profile: acceptance
        commands:
          - "invoke"

defaults:
  timeout: 5s
  confirm: false

cases:
  - id: setup-file-variable
    name: setup file variables feed live commands
    steps:
      - name: read generated config
        run:
          args: ["${file.appConfig}"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "profile: acceptance"
              - '- "invoke"'
            notContains:
              - ".myapp"

      - name: expand setup dir in shell
        run:
          shell: 'test -f "${tmp}/config/app.yaml" && echo setup-dir-ok'
        expect:
          exitCode: 0
          stdout:
            contains:
              - "setup-dir-ok"
