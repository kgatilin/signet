version: 1
suite: two-cases-fixture

subject:
  binary: /bin/echo

cases:
  - id: first-case
    name: first case
    steps:
      - name: first command
        run:
          args: ["first"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "first"

  - id: second-case
    name: second case
    steps:
      - name: second command
        run:
          args: ["second"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "second"
