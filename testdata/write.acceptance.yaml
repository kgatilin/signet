version: 1
suite: write-fixture
description: Fixture proving write steps prompt for confirmation by default.

subject:
  binary: /bin/echo

defaults:
  timeout: 5s

cases:
  - id: write-command
    name: write command requires confirmation
    steps:
      - name: create sample
        run:
          kind: write
          args: ["created"]
        expect:
          exitCode: 0
          stdout:
            contains:
              - "created"
