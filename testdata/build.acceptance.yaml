version: 1
suite: build-fixture
description: Fixture proving setup.build runs before cases and ${binary} expands.

subject:
  binary: /bin/echo

setup:
  build:
    - "echo built-token > ${tmp}/build.marker"

defaults:
  timeout: 5s
  confirm: false

cases:
  - id: build-marker
    name: build output feeds the case
    steps:
      - name: read build marker
        run:
          shell: "cat ${tmp}/build.marker"
        expect:
          exitCode: 0
          stdout:
            contains:
              - "built-token"
      - name: binary variable expands
        run:
          shell: "${binary} binary-var-ok"
        expect:
          exitCode: 0
          stdout:
            contains:
              - "binary-var-ok"
