name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Verify modules
        run: go mod verify

      - name: Test
        run: go test ./...

      - name: Vet
        run: go vet ./...

      - name: Acceptance
        run: make acceptance
